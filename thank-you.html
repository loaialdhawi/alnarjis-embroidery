<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم إرسال طلبك بنجاح | النرجس للتطريز</title>
    <style>
        :root {
            --primary-color: #5c3d48;
            --accent-color: #d4af37;
            --bg-color: #fdfbf7;
            --white: #ffffff;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #2d2d2d;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .thank-you-card {
            background-color: var(--white);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            border: 1px solid #eee;
        }

        /* تنسيق شعار النرجس الدائري في صفحة الشكر */
        .logo-img-thank {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid var(--accent-color); /* إطار ذهبي خفيف حول الشعار */
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            color: #555;
            margin-bottom: 30px;
        }

        .btn-back {
            background-color: var(--primary-color);
            color: var(--white);
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-back:hover {
            background-color: #422b33;
        }

        /* تنسيق إضافي لصفحة الشكر على الهواتف */
        @media (max-width: 768px) {
            .thank-you-card {
                padding: 30px 20px;
                margin: 20px;
            }
            h1 {
                font-size: 24px;
            }
            p {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <img src="317510915_558162199465173_6959746518358324852_n.jpg" alt="شعار النرجس" class="logo-img-thank">
        
        <h1>تم إرسال طلبك بنجاح!</h1>
        <p>شكراً لثقتك بالنرجس للتطريز، سيقوم فريقنا بمراجعة تفاصيل طلبك والتواصل معك عبر الواتساب في أقرب وقت ممكن.</p>
        <a href="index.html" class="btn-back">العودة للرئيسية</a>
    </div>

</body>
</html>
